<app-header [pageTitle]="'Choix de la compétence'" [showBackButton]="true"/>

<ion-content [fullscreen]="true">
  <p>
    Domaine : {{domain}}
  </p>
  <p>
    Chapitre : {{chapter}}
  </p>

  <ion-list>
    @for(skill of skills; track $index) {
      <ion-item>
        <ion-button (click)="startMCQ(skill.skillId)">{{skill.name}}</ion-button>
      </ion-item>
    }
  </ion-list>

  <img [src]="domainsImageName" (error)="hideImage($event)" *ngIf="showImage">
</ion-content>

<app-navbar/>
