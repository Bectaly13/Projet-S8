<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Choix de la compétence</ion-title>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">skills</ion-title>
    </ion-toolbar>
  </ion-header>

  <p>
    Domaine : {{domain}}
  </p>
  <p>
    Chapitre : {{chapter}}
  </p>

  <ion-list>
    @for(skill of skills; track $index) {
      <ion-item>
        <ion-button (click)="startMCQ(skill.skillId)">{{skill.name}}</ion-button>
      </ion-item>
    }
  </ion-list>

  <img [src]="domainsImageName">
</ion-content>
