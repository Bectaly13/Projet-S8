<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Commencer QCM</ion-title>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">startMCQ</ion-title>
    </ion-toolbar>
  </ion-header>

  <p>
    Domaine : {{domain}}
  </p>
  <p>
    Chapitre : {{chapter}}
  </p>

  <ion-button (click)="goToSkills()">J'apprends</ion-button>
  <ion-button (click)="startMCQ()">Je révise</ion-button>

  <img [src]="domainsImageName">
</ion-content>
