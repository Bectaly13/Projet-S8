<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Choix de la filière</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">sectors</ion-title>
    </ion-toolbar>
  </ion-header>

  <h1 id="welcome-title">Bienvenue dans QMax !</h1>

  <p id="welcome-subtitle">Je suis en...</p>

  <ion-list class="list-sectors">
    <div class="button-grid">
      @for (sector of sectors; track $index) {
        <ion-button class="sector-button" (click)="goToDomains(sector.sectorId, sector.name)">
          {{ sector.name }}
        </ion-button>
      }
    </div>
  </ion-list>
</ion-content>
