<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="page-title">Choix de la filière</ion-title>
      <img slot="end" src="../../assets/icons/logo.png" class="logo-small">
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">sectors</ion-title>
    </ion-toolbar>
  </ion-header>

  <h1 id="welcome-title">Bienvenue dans QMax !</h1>

  <p id="welcome-subtitle">Je suis en...</p>

  <div class="button-grid">
    @for (sector of sectors; track $index) {
      <ion-button class="sector-button" (click)="goToDomains(sector.sectorId, sector.name)">
        {{ sector.name }}
      </ion-button>
    }
  </div>
</ion-content>
