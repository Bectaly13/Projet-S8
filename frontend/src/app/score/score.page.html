<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Score</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">score</ion-title>
    </ion-toolbar>
  </ion-header>

  <p>
    Score : {{score}}/{{mcqSize}}
  </p>

  <p>
    {{message}}
  </p>

  <p>
    <ion-button (click)="retry()">Refaire ce QCM</ion-button>
  </p>

  <p>
    <ion-button (click)="backToMenu()">Retour au menu</ion-button>
  </p>

  <img [src]="scoreImageName">
</ion-content>
