<div class="loading-container">
  <div class="logo-container">
    <img src="../../assets/icons/logo.png" alt="Logo de l'app" class="logo" #logo />
    <div class="progress-bar" #progressBar></div>
  </div>
  <div class="progress-text">
    @if (progress < 100) {
      {{ progress }}%
    }
    @else {
      Chargement terminé !
    }
  </div>
</div>
