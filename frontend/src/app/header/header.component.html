<ion-header [translucent]="true">
  <ion-toolbar>
    @if (showBackButton) {
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/"></ion-back-button>
      </ion-buttons>
    }

    <ion-title>{{ pageTitle }}</ion-title>

    <img slot="end" src="assets/icons/logo.png" class="logo-small">
  </ion-toolbar>
</ion-header>
