<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>FAQ</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">faq</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    @for(header of headers; track $index) {
      <ion-item>
        <ion-button (click)="openText($index)">{{header}}</ion-button>
      </ion-item>
    }
  </ion-list>

  <p>
    <ion-button href="mailto:{{mail}}?subject={{subject}}">
      Nous contacter
    </ion-button>
  </p>

  <p>
    <ion-button href="https://www.appli.qmax.fr" target="_blank">
      Notre site Internet
    </ion-button>
  </p>

  <p>
    <ion-button href="https://m.facebook.com/appli.qmax" target="_blank">
      Notre page Facebook
    </ion-button>
  </p>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <app-navbar/>
  </ion-toolbar>
</ion-footer>
