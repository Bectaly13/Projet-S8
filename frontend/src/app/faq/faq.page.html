<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>FAQ</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">faq</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    @for(header of headers; track $index) {
      <ion-item>
        <ion-button (click)="openText($index)">{{header}}</ion-button>
      </ion-item>
    }
  </ion-list>

  <a href="mailto:{{mail}}?subject={{subject}}">
    <ion-button>
      Nous contacter
    </ion-button>
  </a>  

  <p>
    <a href="https://www.appli.qmax.fr">
      <ion-button>
        Notre site internet
      </ion-button>
    </a>
  </p>

  <p>
    <a href="https://www.facebook.com/appli.qmax">
      <ion-button>
        Notre page Facebook
      </ion-button>
    </a>
  </p>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <app-navbar/>
  </ion-toolbar>
</ion-footer>
