<app-header 
  [pageTitle]="'FAQ'"
  [showBackButton]="true">
</app-header>

<ion-content [fullscreen]="true">

  <ion-list>
    @for(header of headers; track $index) {
      <ion-item>
        <ion-button (click)="openText($index)">{{header}}</ion-button>
      </ion-item>
    }
  </ion-list>

  <p>
    Nombre de questions disponibles : {{questionCount}}
  </p>
</ion-content>

<ion-toolbar>
  <app-navbar/>
</ion-toolbar>
