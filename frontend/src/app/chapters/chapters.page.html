<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Choix du chapitre</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">chapters</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    @for(chapter of chapters; track $index) {
      <ion-item>
        <ion-button>{{chapter.name}}</ion-button>
      </ion-item>
    }
  </ion-list>
</ion-content>
