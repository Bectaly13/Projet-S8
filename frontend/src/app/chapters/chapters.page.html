<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Choix du chapitre</ion-title>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">chapters</ion-title>
    </ion-toolbar>
  </ion-header>

  <p>
    Domaine : {{domain}}
  </p>

  <ion-list>
    @for(chapter of chapters; track $index) {
      @if(chapter.isRelevant) {
        <ion-item>
          <ion-button (click)="goToMCQ(chapter.chapterId, chapter.name)">{{chapter.name}}</ion-button>
        </ion-item>
      }
    }
  </ion-list>

  <img [src]="domainsImageName">
</ion-content>
