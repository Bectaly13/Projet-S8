<app-header [pageTitle]="'Statistiques'" [showBackButton]="false"/>

<ion-content [fullscreen]="true">
  <div class="sector">
      Ma filière : {{sector}}
  </div>

  @for(domain of domains; track $index) {
    <ion-card>
      <ion-card-header [style]="'background-color: var(--ion-color-color' + domain.domainId + ');'">
        <ion-card-title class="domain" [style]="'color: var(--ion-color-color' + domain.domainId + '-contrast);'">{{domain.name}} : {{stats[$index].correct / (stats[$index].correct + stats[$index].incorrect + stats[$index].unseen) * 100 | number:'1.1-1'}}%</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <app-doughnut-chart [correct]="stats[$index].correct" [incorrect]="stats[$index].incorrect" [unseen]="stats[$index].unseen" [domainId]="domain.domainId"/>

        <ion-button expand="block" (click)="goToStatsDomain(domain.domainId, domain.name, $index)">
          Voir en détail
        </ion-button>
      </ion-card-content>
    </ion-card>
  }
</ion-content>


<app-navbar/>
