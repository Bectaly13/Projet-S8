<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Je révise</ion-title>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">study</ion-title>
    </ion-toolbar>
  </ion-header>

  @for(question of questions; track $index) {
    <p>Question {{$index + 1}}</p>
    <p>
      @for(choice of choices[$index]; track choice) {
        <p>{{choice.wordingBefore}}</p>
        <p>{{choice.choiceOrder}}. {{choice.choiceText}}</p>
        <p>{{choice.wordingAfter}}</p>
      }
    </p>
    <p>
      Correction : {{question.explanation}}
    </p>
  }
</ion-content>
